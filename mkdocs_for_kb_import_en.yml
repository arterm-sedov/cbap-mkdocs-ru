# This file builds EN help for PHPKB import.
# Build command: .\.venv\Scripts\python.exe -m mkdocs build -f mkdocs_for_kb_import_en.yml

INHERIT: mkdocs_en.yml

docs_dir: docs/en

site_url: ""

use_directory_urls: false

site_dir: for_kb_import_en

site_name: "Imported from the CMW Help"

theme:
  language: en
  custom_dir: overrides_for_kb_import

plugins:
  glightbox:
    manual: true

markdown_extensions:
  toc:
    title: Table of Contents

extra:
    kbExport: true

hooks:
  - kb_html_cleanup_hook.py
