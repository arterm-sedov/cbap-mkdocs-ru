# This file builds RU help for PHPKB import.
# Build command: .\.venv\Scripts\python.exe -m mkdocs build -f mkdocs_for_kb_import_ru.yml
# Platform version: site_url must match the PHPKB web asset folder (v6.0).

INHERIT: mkdocs_ru.yml

docs_dir: docs/ru

site_url: https://kb.comindware.ru/platform/v6.0/

use_directory_urls: false

site_dir: for_kb_import_ru

site_name: "Импорт из справочной системы"

theme:
  custom_dir: overrides_for_kb_import


plugins:
  glightbox:
    manual: true
  minify:
      minify_html: false
      minify_js: true
      minify_css: true
      htmlmin_opts:
          remove_comments: true

markdown_extensions:
  toc:
    title: Содержание
    permalink: false

extra:
    kbExport: true

exclude_docs: |
  **/AGENTS.md

hooks:
  - kb_html_cleanup_hook.py
